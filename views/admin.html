<!DOCTYPE html>
<html lang="id">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="admin-body">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-title">Perpustakaan</div>
        <div class="brand-sub">Panel Admin</div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-label">Koleksi</div>

        <div class="nav-link active" data-page="tambahBuku">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M12 5v14M5 12h14"/>
            </svg>
            Tambah Buku
        </div>

        <div class="nav-link" data-page="daftarBuku">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
            Daftar Buku
        </div>

        <div class="nav-label">Peminjaman</div>

        <div class="nav-link" data-page="inputPeminjaman">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
            Input Peminjaman
        </div>

        <div class="nav-link" data-page="daftarPeminjaman">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            Daftar Peminjaman
        </div>

        <div class="nav-link" data-page="keterlambatan">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Keterlambatan
        </div>
    </nav>

    <div class="sidebar-footer">
        <a href="/">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Logout
        </a>
    </div>
</aside>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main-wrapper">

    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <span class="topbar-title" id="topbarTitle">Tambah Buku</span>
        </div>
        <span class="admin-badge">Admin</span>
    </header>

    <main class="admin-content">

        <!-- PAGE: TAMBAH BUKU -->
        <div class="page active" id="page-tambahBuku">
            <div class="page-header">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                <h2>Tambah Buku</h2>
            </div>
            <div class="card-panel">
                <form id="form" enctype="multipart/form-data">
                    <input type="text" name="title" placeholder="Judul Buku" required>
                    <input type="text" name="author" placeholder="Penulis" required>
                    <input type="text" name="genre" placeholder="Genre" required>
                    <textarea name="description" placeholder="Deskripsi Buku"></textarea>
                    <label style="font-size:13px;color:#64748b;margin-bottom:8px;display:block;font-weight:600;">Cover Buku</label>
                    <input type="file" name="image" accept="image/*">
                    <br>
                    <button type="submit">Tambah Buku</button>
                </form>
            </div>
        </div>

        <!-- PAGE: DAFTAR BUKU -->
        <div class="page" id="page-daftarBuku">
            <div class="page-header">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                <h2>Daftar Buku</h2>
            </div>
            <div class="card-panel">
                <div id="list"></div>
            </div>
            <div id="editBox" class="edit-box" style="display:none;">
                <h3>Edit Buku</h3>
                <input id="editTitle" placeholder="Judul">
                <input id="editAuthor" placeholder="Penulis">
                <input id="editGenre" placeholder="Genre">
                <textarea id="editDesc" placeholder="Deskripsi"></textarea>
                <div class="edit-actions">
                    <button onclick="saveEdit()">Simpan Perubahan</button>
                    <button class="btn-cancel" onclick="document.getElementById('editBox').style.display='none'">Batal</button>
                </div>
            </div>
        </div>

        <!-- PAGE: INPUT PEMINJAMAN -->
        <div class="page" id="page-inputPeminjaman">
            <div class="page-header">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <line x1="19" y1="8" x2="19" y2="14"/>
                    <line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
                <h2>Input Peminjaman</h2>
            </div>
            <div class="card-panel">
                <form id="loanForm">
                    <input name="borrower" placeholder="Nama Peminjam" required>
                    <input name="phone" placeholder="No HP" required>
                    <input name="address" placeholder="Alamat" required>
                    <select name="bookId" id="bookSelect" required></select>
                    <button type="submit">Pinjam Buku</button>
                </form>
            </div>
        </div>

        <!-- PAGE: DAFTAR PEMINJAMAN -->
        <div class="page" id="page-daftarPeminjaman">
            <div class="page-header">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M9 11l3 3L22 4"/>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                </svg>
                <h2>Daftar Peminjaman</h2>
            </div>
            <div id="loanList"></div>
        </div>

        <!-- PAGE: KETERLAMBATAN -->
        <div class="page" id="page-keterlambatan">
            <div class="page-header">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <h2>Reminder Keterlambatan (&gt;7 Hari)</h2>
            </div>
            <div id="lateList"></div>
        </div>

    </main>
</div>

<script src="/js/admin.js"></script>
<script>
    /* ===== SPA ROUTER ===== */
    const pageTitles = {
        tambahBuku: 'Tambah Buku',
        daftarBuku: 'Daftar Buku',
        inputPeminjaman: 'Input Peminjaman',
        daftarPeminjaman: 'Daftar Peminjaman',
        keterlambatan: 'Keterlambatan'
    };

    function goTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId)?.classList.add('active');
        document.querySelectorAll('.nav-link').forEach(a => {
            a.classList.toggle('active', a.dataset.page === pageId);
        });
        document.getElementById('topbarTitle').textContent = pageTitles[pageId] || '';
        window.scrollTo({ top: 0 });
        closeSidebar();
    }

    document.querySelectorAll('.nav-link[data-page]').forEach(link => {
        link.addEventListener('click', () => goTo(link.dataset.page));
    });

    /* ===== MOBILE SIDEBAR ===== */
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }
</script>

</body>
</html>
