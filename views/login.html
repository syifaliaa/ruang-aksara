<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <div class="login-box">

        <h2>Login Admin</h2>

        <p>
            Masuk sebagai admin untuk mengelola buku dan peminjaman.
        </p>

        <form id="loginForm">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p id="msg"></p>

    </div>

    <script src="/js/login.js"></script>

</body>

</html>
